  <path d="M520 610 C560 540, 700 520, 820 520 C950 520, 1040 540, 1120 590 C1150 610, 1160 650, 1140 680 C1110 730, 980 740, 820 740 C660 740, 560 720, 520 680 C500 660, 500 640, 520 610 Z" fill="#0f141b" opacity="0.85"/>
