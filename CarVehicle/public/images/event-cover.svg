  <circle cx="650" cy="715" r="54" fill="#0a0f14" opacity="0.9"/>
  <circle cx="650" cy="715" r="34" fill="#e9f1ff" opacity="0.15"/>
  <circle cx="1040" cy="715" r="54" fill="#0a0f14" opacity="0.9"/>
  <circle cx="1040" cy="715" r="34" fill="#e9f1ff" opacity="0.15"/>

  <text x="90" y="120" font-family="Segoe UI, Arial, sans-serif" font-size="48" fill="#e9f1ff" opacity="0.9" letter-spacing="3">CARVEHICLE • EVENT</text>
  <text x="90" y="175" font-family="Segoe UI, Arial, sans-serif" font-size="22" fill="#e9f1ff" opacity="0.7" letter-spacing="2">Launch / Promotion / Showcase</text>
