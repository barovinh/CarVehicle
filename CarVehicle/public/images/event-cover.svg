      <stop offset="1" stop-color="#00d4ff" stop-opacity="0.25"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0f141b" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0a0f14" stop-opacity="0.9"/>
